# Render Blueprint — 저장소 루트에 이 파일이 있으면
# Render 대시보드에서 "New +" → "Blueprint"로 한 번에 배포됩니다.
services:
  - type: web
    name: welfare-chatbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false   # 대시보드에서 직접 입력 (무료 티어 있음, 코드에 키를 넣지 마세요!)
      - key: ANTHROPIC_API_KEY
        sync: false   # 선택 사항 (GROQ_API_KEY가 없을 때 사용)
